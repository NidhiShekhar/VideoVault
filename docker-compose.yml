version: "3.9"

services:
  upload-service:
    build:
      context: ./services/upload-service
    container_name: videovault-upload-service
    ports:
      - "8080:8080"
    depends_on:
      - kafka
      - postgres
    environment:
      VIDEOVAULT_SERVICE_ENV: docker
      VIDEOVAULT_SERVER_PORT: "8080"
      VIDEOVAULT_LOG_LEVEL: debug

  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.1
    container_name: videovault-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.7.1
    container_name: videovault-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: videovault-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8081:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  postgres:
    image: postgres:16-alpine
    container_name: videovault-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: videovault
      POSTGRES_PASSWORD: videovault
      POSTGRES_DB: videovault
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
